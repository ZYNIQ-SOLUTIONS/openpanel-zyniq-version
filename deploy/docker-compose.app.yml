# ══════════════════════════════════════════════════════════════════
# Z-OpenPanel (ZYNIQ Cloud Analytics) — App Stack
# ══════════════════════════════════════════════════════════════════
# Run AFTER docker-compose.infra.yml is healthy
# docker compose -f docker-compose.app.yml --env-file .env up -d --build
# ══════════════════════════════════════════════════════════════════

networks:
  zyniq-network:
    external: true

services:

  analytics-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.bun
    container_name: analytics-api
    restart: unless-stopped
    environment:
      # Storage
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_DIRECT=${DATABASE_URL_DIRECT}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - REDIS_URL=${REDIS_URL}
      # Application
      - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - BATCH_SIZE=${BATCH_SIZE:-5000}
      - BATCH_INTERVAL=${BATCH_INTERVAL:-10000}
      - CONCURRENCY=${CONCURRENCY:-10}
      # Keycloak SSO (ZYNIQ Auth Service)
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-zyniq-studio}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-z-openpanel}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      # OAuth Providers
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    networks:
      - zyniq-network
    depends_on:
      - analytics-worker

  analytics-worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile.bun
    container_name: analytics-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_DIRECT=${DATABASE_URL_DIRECT}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - REDIS_URL=${REDIS_URL}
      - WORKER_PORT=${WORKER_PORT:-9999}
      - BATCH_SIZE=${BATCH_SIZE:-5000}
      - BATCH_INTERVAL=${BATCH_INTERVAL:-10000}
      - CONCURRENCY=${CONCURRENCY:-10}
    networks:
      - zyniq-network

  analytics-dashboard:
    build:
      context: ..
      dockerfile: apps/start/Dockerfile.bun
      args:
        - VITE_KEYCLOAK_URL=${VITE_KEYCLOAK_URL}
        - VITE_KEYCLOAK_REALM=${VITE_KEYCLOAK_REALM:-zyniq-studio}
        - VITE_KEYCLOAK_CLIENT_ID=${VITE_KEYCLOAK_CLIENT_ID:-z-openpanel}
        - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: analytics-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_DASHBOARD_URL=${NEXT_PUBLIC_DASHBOARD_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - VITE_KEYCLOAK_URL=${VITE_KEYCLOAK_URL}
      - VITE_KEYCLOAK_REALM=${VITE_KEYCLOAK_REALM:-zyniq-studio}
      - VITE_KEYCLOAK_CLIENT_ID=${VITE_KEYCLOAK_CLIENT_ID:-z-openpanel}
    networks:
      - zyniq-network
    depends_on:
      - analytics-api
